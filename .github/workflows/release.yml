name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (for example: v0.3.0)"
        required: true
        type: string
      draft:
        description: "Create as draft release"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean
      release_notes:
        description: "Optional custom release notes (if empty, generate notes automatically)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure local Claude settings are not tracked
        run: |
          if git ls-files --error-unmatch .claude/settings.local.json >/dev/null 2>&1; then
            echo "ERROR: .claude/settings.local.json must not be tracked."
            exit 1
          fi

      - name: Run unit tests
        run: |
          python3 -m unittest discover -s tests -q

      - name: Verify Python sources compile
        run: |
          python3 -m py_compile \
            plugins/evidence-and-tooling/scripts/_shared.py \
            plugins/evidence-and-tooling/scripts/build_index.py \
            plugins/evidence-and-tooling/scripts/contribute_bug.py \
            tests/test_crypto_audit_plugin_scaffolding.py \
            tests/test_zkbugs_index_cli.py

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub release for tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          event_name="${{ github.event_name }}"
          draft_flag="true"
          prerelease_flag="false"
          release_notes=""

          if [ "$event_name" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.version }}"
            draft_flag="${{ github.event.inputs.draft }}"
            prerelease_flag="${{ github.event.inputs.prerelease }}"
            release_notes="${{ github.event.inputs.release_notes }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ "$tag" != v* ]]; then
            echo "ERROR: Release tag must start with 'v'. Got: $tag"
            exit 1
          fi
          version="${tag#v}"

          notes_file="$(mktemp)"
          if ! awk -v ver="$version" '
            BEGIN { in_section = 0; found = 0 }
            $0 ~ "^## \\[" ver "\\]" { in_section = 1; found = 1; print; next }
            in_section && $0 ~ "^## \\[" { exit }
            in_section { print }
            END {
              if (found == 0) {
                exit 2
              }
            }
          ' CHANGELOG.md > "$notes_file"; then
            echo "ERROR: Missing changelog entry for ${version} in CHANGELOG.md"
            exit 1
          fi

          if [ -z "$(tail -n +2 "$notes_file" | tr -d '[:space:]')" ]; then
            echo "ERROR: Changelog section for ${version} is empty in CHANGELOG.md"
            exit 1
          fi

          if [ -n "$release_notes" ]; then
            {
              echo
              echo "---"
              echo
              echo "$release_notes"
            } >> "$notes_file"
          fi

          title="zkcrypto-audit ${tag}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release ${tag} already exists. Skipping create."
          else
            cmd=(gh release create "$tag" --title "$title")

            if [ "$draft_flag" = "true" ]; then
              cmd+=(--draft)
            fi
            if [ "$prerelease_flag" = "true" ]; then
              cmd+=(--prerelease)
            fi
            cmd+=(--notes-file "$notes_file")

            if [ "$event_name" = "workflow_dispatch" ]; then
              cmd+=(--target "${GITHUB_SHA}")
            fi

            "${cmd[@]}"
          fi
